name: Deploy 스케줄 어드민

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: printf '%s' "$ENV_LOCAL" > .env.local
        env:
          ENV_LOCAL: ${{ secrets.ENV_LOCAL }}

      - name: Build
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Backup server current version
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} "
            TIMESTAMP=\$(date +%Y%m%d_%H%M%S)
            mkdir -p /home/ubuntu/backups/schedule-admin/\$TIMESTAMP
            rsync -a --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' \
              /home/ubuntu/blog-schedule-admin/ /home/ubuntu/backups/schedule-admin/\$TIMESTAMP/
            ls -dt /home/ubuntu/backups/schedule-admin/*/ 2>/dev/null | tail -n +6 | xargs rm -rf
            echo Backup done: \$TIMESTAMP
          "

      - name: Upload to server
        run: |
          rsync -az --delete \
            --exclude='node_modules' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            --exclude='backups' \
            --exclude='.git' \
            --exclude='.claude' \
            --exclude='.env.local' \
            --exclude='.env' \
            ./ ubuntu@${{ secrets.SERVER_HOST }}:/home/ubuntu/blog-schedule-admin/

      - name: Install deps, migrate DB & reload PM2
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} "
            set -e
            cd /home/ubuntu/blog-schedule-admin
            npm install --production --silent
            npx prisma db push
            if pm2 describe blog-schedule-admin > /dev/null 2>&1; then
              pm2 reload blog-schedule-admin --update-env
            else
              pm2 start npm --name 'blog-schedule-admin' -- start -- -p 3001
            fi
            pm2 save
            echo '=== 배포 완료 ==='
          "
